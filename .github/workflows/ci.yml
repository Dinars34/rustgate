name: Rust CI

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Check Formatting
      run: cargo fmt -- --check
      
    - name: Run Linter (Clippy)
      run: cargo clippy -- -D warnings
      
    - name: Run Tests
      run: cargo test